  <text x="76" y="108" font-family="Manrope,system-ui,sans-serif" font-weight="500" font-size="9" fill="#c8a96e" opacity="0.6" letter-spacing="2">ЦЕНТРАЛЬНАЯ АЗИЯ · РОССИЯ · КИТАЙ</text>
