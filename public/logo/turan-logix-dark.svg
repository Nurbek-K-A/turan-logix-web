  <rect x="28.5" y="78" width="3"   height="13" rx="1.5" fill="#c8a96e" opacity="0.90"/>
  <rect x="28.8" y="58" width="2.4" height="11" rx="1.2" fill="#c8a96e" opacity="0.65"/>
  <rect x="29"   y="42" width="2"   height="9"  rx="1"   fill="#c8a96e" opacity="0.42"/>
  <rect x="29.2" y="30" width="1.6" height="7"  rx="0.8" fill="#c8a96e" opacity="0.26"/>
  <g transform="translate(30,18)">
    <polygon points="0,-11 3,-3 11,0 3,3 0,11 -3,3 -11,0 -3,-3" fill="#c8a96e"/>
