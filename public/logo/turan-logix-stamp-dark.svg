<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" fill="none">
  <!-- Outer ring -->
  <circle cx="110" cy="110" r="106" stroke="#c8a96e" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="110" cy="110" r="94" stroke="#c8a96e" stroke-width="0.7" opacity="0.4"/>

  <!-- Top arc text: ГРУЗОВЫЕ ПЕРЕВОЗКИ · FREIGHT -->
  <path id="top-arc-dark" d="M 110,110 m -85,0 a 85,85 0 0,1 170,0" fill="none"/>
  <text font-family="Manrope, system-ui, sans-serif" font-weight="500" font-size="10.5" fill="#c8a96e" letter-spacing="2">
    <textPath href="#top-arc-dark" startOffset="50%" text-anchor="middle">ГРУЗОВЫЕ ПЕРЕВОЗКИ · FREIGHT</textPath>
  </text>

  <!-- Bottom arc text: ЦА · РОССИЯ · КИТАЙ · KZ -->
  <path id="bot-arc-dark" d="M 110,110 m -80,0 a 80,80 0 0,0 160,0" fill="none"/>
  <text font-family="Manrope, system-ui, sans-serif" font-weight="500" font-size="10.5" fill="#c8a96e" letter-spacing="2">
    <textPath href="#bot-arc-dark" startOffset="50%" text-anchor="middle">ЦА · РОССИЯ · КИТАЙ · KZ</textPath>
  </text>

  <!-- Central sign -->
  <g transform="translate(110,88)">
    <polygon points="16,88 44,88 36,10 24,10" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.22" transform="translate(-30,-82) scale(0.72)"/>
    <rect x="-1.08" y="-14" width="2.16" height="8.64" rx="1.08" fill="#c8a96e" opacity="0.9"/>
    <rect x="-0.86" y="-25.6" width="1.73" height="7.2" rx="0.86" fill="#c8a96e" opacity="0.65"/>
    <rect x="-0.72" y="-35" width="1.44" height="5.76" rx="0.72" fill="#c8a96e" opacity="0.42"/>
    <rect x="-0.58" y="-42.5" width="1.15" height="4.32" rx="0.58" fill="#c8a96e" opacity="0.26"/>
    <g transform="translate(0,-52)">
      <polygon points="0,-11 3,-3 11,0 3,3 0,11 -3,3 -11,0 -3,-3" fill="#c8a96e"/>
      <polygon points="0,-11 3,-3 11,0 3,3 0,11 -3,3 -11,0 -3,-3" fill="#c8a96e" transform="rotate(45)" opacity="0.38"/>
      <circle cx="0" cy="0" r="17" fill="none" stroke="#c8a96e" stroke-width="0.5" opacity="0.22"/>
    </g>
  </g>

  <!-- TURAN / LOGIX text -->
  <text x="110" y="148" font-family="Manrope, system-ui, sans-serif" font-weight="800" font-size="18" fill="#f5f0e8" letter-spacing="4" text-anchor="middle">TURAN</text>
  <text x="110" y="167" font-family="Manrope, system-ui, sans-serif" font-weight="800" font-size="18" fill="#c8a96e" letter-spacing="4" text-anchor="middle">LOGIX</text>
</svg>
