<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1c1f26"/>
  <!-- Road sign scaled to 32px container (original viewBox 60x90, sign centered at 30,6 for star) -->
  <!-- Scale factor: 32/90 ≈ 0.356, translate to center horizontally: (32 - 60*0.356)/2 ≈ 5.3 -->
  <g transform="translate(5.3, 0) scale(0.356)">
    <polygon points="16,88 44,88 36,10 24,10" fill="none" stroke="#c8a96e" stroke-width="0.8" opacity="0.22"/>
    <rect x="28.5" y="68" width="3"   height="12" rx="1.5" fill="#c8a96e" opacity="0.9"/>
    <rect x="28.8" y="50" width="2.4" height="10" rx="1.2" fill="#c8a96e" opacity="0.65"/>
    <rect x="29"   y="35" width="2"   height="8"  rx="1"   fill="#c8a96e" opacity="0.42"/>
    <rect x="29.2" y="23" width="1.6" height="6"  rx="0.8" fill="#c8a96e" opacity="0.26"/>
    <g transform="translate(30,6)">
      <polygon points="0,-11 3,-3 11,0 3,3 0,11 -3,3 -11,0 -3,-3" fill="#c8a96e"/>
      <polygon points="0,-11 3,-3 11,0 3,3 0,11 -3,3 -11,0 -3,-3" fill="#c8a96e" transform="rotate(45)" opacity="0.38"/>
      <circle cx="0" cy="0" r="17" fill="none" stroke="#c8a96e" stroke-width="0.5" opacity="0.22"/>
    </g>
  </g>
</svg>
